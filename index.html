<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learn SQL with iKay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #1a5c34;
    --green-mid: #2a7a46;
    --green-light: #4caf70;
    --green-xlight: #d4edda;
    --white: #ffffff;
    --off-white: #f8faf9;
    --text: #1a2e22;
    --text-muted: #5a7a65;
    --border: #c8e0d0;
    --shadow: 0 4px 24px rgba(26,92,52,0.12);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
  }

  /* === HEADER === */
  header {
    background: var(--green);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }
  header img { height: 48px; filter: brightness(0) invert(1); }
  header .brand { color: #fff; }
  header .brand h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.3px; }
  header .brand p { font-size: 0.75rem; opacity: 0.8; font-weight: 600; }
  .progress-bar-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .progress-bar {
    width: 180px;
    height: 10px;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #6ee89a;
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  /* === LAYOUT === */
  .container { display: flex; min-height: calc(100vh - 76px); }

  /* === SIDEBAR === */
  .sidebar {
    width: 280px;
    background: var(--white);
    border-right: 2px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 800;
    padding: 8px 20px 6px;
  }
  .lesson-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 20px;
    border: none;
    background: none;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
  }
  .lesson-btn:hover { background: var(--green-xlight); }
  .lesson-btn.active { background: var(--green); color: #fff; border-right: 4px solid var(--green-light); }
  .lesson-btn.done .icon { background: #2a7a46; color: #fff; }
  .lesson-btn.active .icon { background: rgba(255,255,255,0.2); color: #fff; }
  .lesson-btn .icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--green-xlight);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    color: var(--green);
    font-weight: 900;
  }
  .lesson-btn .check { margin-left: auto; font-size: 1rem; }

  /* === MAIN === */
  .main { flex: 1; padding: 32px; overflow-y: auto; max-width: 860px; }

  /* === LESSON CARD === */
  .lesson-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: var(--shadow);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .lesson-tag {
    display: inline-block;
    background: var(--green-xlight);
    color: var(--green);
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .lesson-card h2 {
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--green);
    margin-bottom: 8px;
  }
  .lesson-card .intro {
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .fun-fact {
    background: linear-gradient(135deg, #e8f5ee, #f0faf3);
    border-left: 4px solid var(--green-light);
    border-radius: 0 12px 12px 0;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--green);
  }
  .fun-fact span { font-size: 1.2rem; margin-right: 8px; }

  /* === CODE BLOCKS === */
  .code-example {
    background: #1a2e22;
    border-radius: 12px;
    padding: 20px 22px;
    margin: 16px 0;
    position: relative;
    overflow: hidden;
  }
  .code-example::before {
    content: 'SQL';
    position: absolute;
    top: 8px; right: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: rgba(110,232,154,0.6);
    letter-spacing: 1px;
  }
  .code-example code {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: #e8f5ee;
    white-space: pre;
    display: block;
    line-height: 1.7;
  }
  .code-example code .kw { color: #6ee89a; font-weight: 700; }
  .code-example code .str { color: #ffd580; }
  .code-example code .num { color: #79c7ff; }
  .code-example code .cmt { color: #6a9a75; font-style: italic; }

  /* === INTERACTIVE QUIZ === */
  .quiz-section {
    margin-top: 28px;
    border-top: 2px dashed var(--border);
    padding-top: 24px;
  }
  .quiz-section h3 {
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--green);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .quiz-card {
    background: var(--off-white);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .quiz-card .q {
    font-weight: 800;
    margin-bottom: 14px;
    font-size: 0.95rem;
  }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-option {
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    background: var(--white);
    transition: all 0.2s;
    text-align: left;
  }
  .quiz-option:hover { border-color: var(--green-light); background: var(--green-xlight); }
  .quiz-option.correct { background: #d4edda; border-color: #2a7a46; color: #1a5c34; }
  .quiz-option.wrong { background: #fde8e8; border-color: #c0392b; color: #c0392b; }
  .quiz-feedback {
    margin-top: 12px;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 10px 14px;
    border-radius: 10px;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: #d4edda; color: #1a5c34; }
  .quiz-feedback.wrong { background: #fde8e8; color: #c0392b; }

  /* === TRY IT AREA === */
  .try-it {
    margin-top: 20px;
    background: #f4faf6;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .try-it h4 { font-weight: 900; color: var(--green); margin-bottom: 10px; font-size: 0.95rem; }
  .try-it textarea {
    width: 100%;
    min-height: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    resize: vertical;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s;
  }
  .try-it textarea:focus { outline: none; border-color: var(--green-light); }
  .btn-run {
    margin-top: 10px;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-run:hover { background: var(--green-mid); }
  .btn-run:active { transform: scale(0.97); }
  .sim-result {
    margin-top: 12px;
    background: #1a2e22;
    border-radius: 10px;
    padding: 14px 16px;
    display: none;
    overflow-x: auto;
  }
  .sim-result.show { display: block; }
  .sim-table { border-collapse: collapse; width: 100%; font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #e8f5ee; }
  .sim-table th { background: rgba(110,232,154,0.2); color: #6ee89a; padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(110,232,154,0.3); }
  .sim-table td { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .sim-table tr:last-child td { border-bottom: none; }
  .result-msg { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: #6ee89a; }

  /* === NAV BUTTONS === */
  .nav-btns {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 2px solid var(--border);
  }
  .btn-nav {
    padding: 11px 24px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid var(--green);
  }
  .btn-prev { background: var(--white); color: var(--green); }
  .btn-prev:hover { background: var(--green-xlight); }
  .btn-next { background: var(--green); color: #fff; }
  .btn-next:hover { background: var(--green-mid); }

  /* === CONGRATS === */
  .congrats {
    text-align: center;
    padding: 48px 20px;
    display: none;
  }
  .congrats.show { display: block; }
  .congrats .trophy { font-size: 5rem; display: block; margin-bottom: 16px; animation: bounce 0.8s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  .congrats h2 { font-size: 2rem; color: var(--green); font-weight: 900; margin-bottom: 10px; }
  .congrats p { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }
  .btn-restart {
    background: var(--green);
    color: #fff;
    border: none;
    padding: 14px 36px;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: var(--green-mid); }

  .stars { color: #f6c90e; font-size: 1.4rem; margin-bottom: 16px; letter-spacing: 4px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  @media (max-width: 700px) {
    .sidebar { width: 220px; }
    .main { padding: 20px 16px; }
    .quiz-options { grid-template-columns: 1fr; }
  }
  @media (max-width: 520px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--border); display: flex; flex-wrap: wrap; padding: 10px; gap: 4px; }
    .lesson-btn { width: auto; padding: 8px 12px; font-size: 0.75rem; border-radius: 8px; }
    .lesson-btn .icon, .lesson-btn .check { display: none; }
    .lesson-btn.active { border-right: none; border-bottom: 3px solid var(--green-light); }
    header img { height: 36px; }
  }
</style>
</head>
<body>

<header>
  <img id="logo" src="" alt="Learn With iKay"/>
  <div class="brand">
    <h1>Learn SQL with iKay</h1>
    <p>PostgreSQL for Beginners</p>
  </div>
  <div class="progress-bar-wrap">
    <span id="progress-label">0/15</span>
    <div class="progress-bar"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</header>

<div class="container">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<script>
document.getElementById('logo').src = 'logo.png'
const LESSONS = [
  {
    id: 0, emoji: '🧮', title: 'SQL as a Calculator',
    tag: 'Lesson 1',
    intro: 'Did you know SQL can do maths? Before we store any data, let\'s use SQL like a super-powered calculator! Every query starts with the magic word SELECT.',
    fact: '💡 Fun Fact: SQL stands for Structured Query Language. It\'s how we "talk" to databases — like texting a library to find a book!',
    code: `<span class="kw">SELECT</span> <span class="num">10</span> + <span class="num">5</span>;    <span class="cmt">-- Result: 15</span>
<span class="kw">SELECT</span> <span class="num">7</span> * <span class="num">8</span>;     <span class="cmt">-- Result: 56</span>
<span class="kw">SELECT</span> <span class="num">50</span> - <span class="num">23</span>;   <span class="cmt">-- Result: 27</span>
<span class="kw">SELECT</span> <span class="num">45</span> / <span class="num">9</span>;    <span class="cmt">-- Result: 5</span>`,
    tryPrompt: 'Try: SELECT 12 * 5;',
    tryAnswer: 'select 12 * 5',
    simFn: (q) => {
      const m = q.match(/select\s+(\d+)\s*\*\s*(\d+)/i);
      if (m) return { cols: ['result'], rows: [[parseInt(m[1])*parseInt(m[2])]] };
      const a = q.match(/select\s+(\d+)\s*\+\s*(\d+)/i);
      if (a) return { cols: ['result'], rows: [[parseInt(a[1])+parseInt(a[2])]] };
      const s = q.match(/select\s+(\d+)\s*-\s*(\d+)/i);
      if (s) return { cols: ['result'], rows: [[parseInt(s[1])-parseInt(s[2])]] };
      const d = q.match(/select\s+(\d+)\s*\/\s*(\d+)/i);
      if (d) return { cols: ['result'], rows: [[Math.round(parseInt(d[1])/parseInt(d[2]))]] };
      return null;
    },
    quiz: [
      { q: 'What keyword starts every SQL query shown here?', opts: ['FROM','WHERE','SELECT','INSERT'], ans: 2, exp: '✅ Correct! SELECT tells SQL what you want to get or calculate.' },
      { q: 'What does SELECT 6 * 7 return?', opts: ['13','42','76','67'], ans: 1, exp: '✅ Great! 6 × 7 = 42.' }
    ]
  },
  {
    id: 1, emoji: '🏷️', title: 'Data Types',
    tag: 'Lesson 2',
    intro: 'Just like a box can hold different things — toys, books, food — databases store different types of data. PostgreSQL uses "data types" to keep things organised!',
    fact: '💡 Think of data types like containers: a number box, a word box, a yes/no box, and a date box. You can\'t put a word in a number box!',
    code: `<span class="cmt">-- Text as a DATE</span>
<span class="kw">SELECT</span> <span class="str">'2023-01-01'</span>::<span class="kw">DATE</span>;

<span class="cmt">-- Decimal as INTEGER (rounds down!)</span>
<span class="kw">SELECT</span> <span class="num">100.5</span>::<span class="kw">INTEGER</span>;   <span class="cmt">-- = 100</span>

<span class="cmt">-- Number as BOOLEAN</span>
<span class="kw">SELECT</span> <span class="num">1</span>::<span class="kw">BOOLEAN</span>;       <span class="cmt">-- = true</span>`,
    tryPrompt: 'Try: SELECT \'hello\'::TEXT;',
    tryAnswer: "select 'hello'::text",
    simFn: (q) => {
      if (/select\s+'hello'::text/i.test(q)) return { cols: ['text'], rows: [['hello']] };
      if (/select\s+\d+\s*::\s*boolean/i.test(q)) return { cols: ['bool'], rows: [['true']] };
      if (/select\s+[\d.]+\s*::\s*integer/i.test(q)) { const n = q.match(/select\s+([\d.]+)/i); return { cols: ['integer'], rows: [[Math.floor(parseFloat(n[1]))]] }; }
      return null;
    },
    quiz: [
      { q: 'Which data type stores whole numbers (no decimals)?', opts: ['TEXT','BOOLEAN','NUMERIC','INTEGER'], ans: 3, exp: '✅ Yes! INTEGER stores whole numbers like 5, 42, or 100.' },
      { q: 'What does :: do in PostgreSQL?', opts: ['Deletes data','Casts to a data type','Creates a table','Adds a column'], ans: 1, exp: '✅ The :: symbol "casts" (converts) a value to a different type.' }
    ]
  },
  {
    id: 2, emoji: '🏗️', title: 'CREATE TABLE',
    tag: 'Lesson 3',
    intro: 'Now let\'s build our first real database table! A table is like a spreadsheet — it has column names and rows of data. We use CREATE TABLE to set it up.',
    fact: '💡 Imagine creating a class register. You decide the columns first (name, age, grade), then fill in the rows later.',
    code: `<span class="kw">CREATE TABLE</span> students (
  id       <span class="kw">INTEGER</span>,
  full_name <span class="kw">TEXT</span>,
  age      <span class="kw">INTEGER</span>,
  gender   <span class="kw">TEXT</span>,
  gpa      <span class="kw">NUMERIC</span>,
  enrolled <span class="kw">BOOLEAN</span>
);`,
    tryPrompt: 'What would you add? (Just explore the code above!)',
    tryAnswer: null,
    simFn: () => ({ cols: ['id','full_name','age','gender','gpa','enrolled'], rows: [] }),
    quiz: [
      { q: 'What does CREATE TABLE do?', opts: ['Fills table with data','Makes a new empty table','Deletes a table','Shows table data'], ans: 1, exp: '✅ CREATE TABLE builds an empty table structure with named columns.' },
      { q: 'Which column would store "true" or "false"?', opts: ['id','full_name','gpa','enrolled'], ans: 3, exp: '✅ BOOLEAN columns store true/false values — perfect for yes/no questions!' }
    ]
  },
  {
    id: 3, emoji: '✍️', title: 'INSERT INTO',
    tag: 'Lesson 4',
    intro: 'A table without data is like a classroom with no students! Let\'s add some Nigerian students to our table using INSERT INTO.',
    fact: '💡 Each INSERT adds one row. You can add multiple rows at once by separating them with commas — super fast!',
    code: `<span class="kw">INSERT INTO</span> students
<span class="kw">VALUES</span>
  (<span class="num">1</span>, <span class="str">'Obi Ikenna'</span>,  <span class="num">23</span>, <span class="str">'Male'</span>,   <span class="num">3.6</span>, <span class="kw">true</span>),
  (<span class="num">2</span>, <span class="str">'Ada Eze'</span>,     <span class="num">22</span>, <span class="str">'Female'</span>, <span class="num">3.7</span>, <span class="kw">true</span>),
  (<span class="num">3</span>, <span class="str">'Afoma Okafor'</span>, <span class="num">26</span>, <span class="str">'Female'</span>, <span class="num">3.2</span>, <span class="kw">false</span>),
  (<span class="num">4</span>, <span class="str">'Musa Isa'</span>,    <span class="num">32</span>, <span class="str">'Male'</span>,   <span class="num">2.7</span>, <span class="kw">false</span>),
  (<span class="num">5</span>, <span class="str">'Ify Ndu'</span>,     <span class="num">25</span>, <span class="str">'Female'</span>, <span class="num">4.3</span>, <span class="kw">true</span>);`,
    tryPrompt: 'How many students were inserted?',
    tryAnswer: null,
    simFn: () => ({ msg: '✅ 5 rows inserted successfully!' }),
    quiz: [
      { q: 'Which keyword adds rows to a table?', opts: ['SELECT','UPDATE','INSERT INTO','CREATE'], ans: 2, exp: '✅ INSERT INTO adds new rows of data into a table.' },
      { q: 'In the example, which student has the highest GPA?', opts: ['Obi Ikenna','Ada Eze','Musa Isa','Ify Ndu'], ans: 3, exp: '✅ Ify Ndu has a GPA of 4.3 — the highest!' }
    ]
  },
  {
    id: 4, emoji: '🔍', title: 'SELECT',
    tag: 'Lesson 5',
    intro: 'SELECT is the most used SQL command! It lets us READ data from a table. You can get all columns with * or pick specific ones.',
    fact: '💡 Think of SELECT like asking the database a question. "Hey database, show me all students!" or "Just show me names and grades, please."',
    code: `<span class="cmt">-- Get EVERYTHING</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students;

<span class="cmt">-- Get only specific columns</span>
<span class="kw">SELECT</span> full_name, gpa
<span class="kw">FROM</span> students;`,
    tryPrompt: 'Try: SELECT * FROM students;',
    tryAnswer: 'select * from students',
    simFn: (q) => {
      const data = [
        [1,'Obi Ikenna',23,'Male',3.6,true],
        [2,'Ada Eze',22,'Female',3.7,true],
        [3,'Afoma Okafor',26,'Female',3.2,false],
        [4,'Musa Isa',32,'Male',2.7,false],
        [5,'Ify Ndu',25,'Female',4.3,true]
      ];
      if (/select\s+\*\s+from\s+students/i.test(q)) return { cols:['id','full_name','age','gender','gpa','enrolled'], rows: data };
      if (/select\s+full_name,\s*gpa/i.test(q)) return { cols:['full_name','gpa'], rows: data.map(r=>[r[1],r[4]]) };
      return null;
    },
    quiz: [
      { q: 'What does SELECT * mean?', opts: ['Select nothing','Select all columns','Select first row','Delete all rows'], ans: 1, exp: '✅ The * (asterisk) means "all columns". Quick and easy!' },
      { q: 'Which keyword tells SQL where to look?', opts: ['GET','FROM','IN','AT'], ans: 1, exp: '✅ FROM tells SQL which table to read data from.' }
    ]
  },
  {
    id: 5, emoji: '🎯', title: 'WHERE Clause',
    tag: 'Lesson 6',
    intro: 'What if you only want some rows? Use WHERE to filter! It\'s like a bouncer at a door — only rows that pass the test get through.',
    fact: '💡 You can use: = (equals), > (greater than), < (less than), >= (at least), <> (not equal). Very powerful!',
    code: `<span class="cmt">-- Students with GPA above 3.5</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">WHERE</span> gpa > <span class="num">3.5</span>;

<span class="cmt">-- Female students only</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">WHERE</span> gender = <span class="str">'Female'</span>;`,
    tryPrompt: "Try: SELECT * FROM students WHERE gpa > 3.5;",
    tryAnswer: 'select * from students where gpa > 3.5',
    simFn: (q) => {
      const data = [
        [1,'Obi Ikenna',23,'Male',3.6,true],
        [2,'Ada Eze',22,'Female',3.7,true],
        [3,'Afoma Okafor',26,'Female',3.2,false],
        [4,'Musa Isa',32,'Male',2.7,false],
        [5,'Ify Ndu',25,'Female',4.3,true]
      ];
      if (/where\s+gpa\s*>\s*3\.5/i.test(q)) return { cols:['id','full_name','age','gender','gpa','enrolled'], rows: data.filter(r=>r[4]>3.5) };
      if (/where\s+gender\s*=\s*'female'/i.test(q)) return { cols:['id','full_name','age','gender','gpa','enrolled'], rows: data.filter(r=>r[3]==='Female') };
      return null;
    },
    quiz: [
      { q: 'SELECT * FROM students WHERE age < 25 — what does this return?', opts: ['All students','Students older than 25','Students younger than 25','No results'], ans: 2, exp: '✅ WHERE age < 25 filters to show only students with age less than 25.' },
      { q: 'Which operator means "not equal"?', opts: ['!=','<>','=/=','All of these'], ans: 1, exp: '✅ In PostgreSQL, <> means "not equal to".' }
    ]
  },
  {
    id: 6, emoji: '📊', title: 'ORDER BY',
    tag: 'Lesson 7',
    intro: 'Want your results sorted? ORDER BY does exactly that — it sorts rows in ascending (A→Z, 1→9) or descending (Z→A, 9→1) order.',
    fact: '💡 ASC means Ascending (smallest first). DESC means Descending (largest first). If you don\'t write either, ASC is the default!',
    code: `<span class="cmt">-- Sort by age (youngest first)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">ORDER BY</span> age;  <span class="cmt">-- ASC is default</span>

<span class="cmt">-- Sort by GPA (highest first)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">ORDER BY</span> gpa <span class="kw">DESC</span>;`,
    tryPrompt: 'Try: SELECT * FROM students ORDER BY gpa DESC;',
    tryAnswer: 'select * from students order by gpa desc',
    simFn: (q) => {
      const data = [
        [1,'Obi Ikenna',23,'Male',3.6,true],
        [2,'Ada Eze',22,'Female',3.7,true],
        [3,'Afoma Okafor',26,'Female',3.2,false],
        [4,'Musa Isa',32,'Male',2.7,false],
        [5,'Ify Ndu',25,'Female',4.3,true]
      ];
      const sorted = [...data];
      if (/order by\s+gpa\s+desc/i.test(q)) { sorted.sort((a,b)=>b[4]-a[4]); return { cols:['id','full_name','age','gender','gpa','enrolled'], rows: sorted }; }
      if (/order by\s+age/i.test(q)) { sorted.sort((a,b)=>a[2]-b[2]); return { cols:['id','full_name','age','gender','gpa','enrolled'], rows: sorted }; }
      return null;
    },
    quiz: [
      { q: 'What does ORDER BY gpa DESC do?', opts: ['Sorts by name A-Z','Sorts GPA lowest first','Sorts GPA highest first','Deletes sorted rows'], ans: 2, exp: '✅ DESC = Descending = highest value first. Perfect for leaderboards!' },
      { q: 'What is the default sort order if you don\'t write ASC or DESC?', opts: ['Random','DESC','ASC','None'], ans: 2, exp: '✅ ASC (ascending) is the default — smallest/earliest values come first.' }
    ]
  },
  {
    id: 7, emoji: '✏️', title: 'UPDATE',
    tag: 'Lesson 8',
    intro: 'Made a mistake? Need to change a value? UPDATE lets you modify existing rows. Always use WHERE — otherwise you\'ll change EVERY row by accident!',
    fact: '⚠️ Pro Tip: Always test your WHERE clause with SELECT first before running UPDATE. This way you know exactly which rows will change!',
    code: `<span class="cmt">-- Change Ada Eze's GPA to 4.0</span>
<span class="kw">UPDATE</span> students
<span class="kw">SET</span> gpa = <span class="num">4.0</span>
<span class="kw">WHERE</span> id = <span class="num">2</span>;

<span class="cmt">-- Verify the change</span>
<span class="kw">SELECT</span> full_name, gpa 
<span class="kw">FROM</span> students 
<span class="kw">WHERE</span> id = <span class="num">2</span>;`,
    tryPrompt: 'Type: UPDATE students SET gpa = 4.0 WHERE id = 2;',
    tryAnswer: null,
    simFn: () => ({ msg: '✅ UPDATE executed! 1 row affected.' }),
    quiz: [
      { q: 'Which keyword changes existing values?', opts: ['CHANGE','MODIFY','UPDATE','ALTER'], ans: 2, exp: '✅ UPDATE is used to modify existing data in a table.' },
      { q: 'Why is WHERE important in an UPDATE statement?', opts: ['It\'s optional','It speeds things up','It targets specific rows','It creates new rows'], ans: 2, exp: '✅ Without WHERE, ALL rows get updated — which is usually a big mistake!' }
    ]
  },
  {
    id: 8, emoji: '🗑️', title: 'DELETE',
    tag: 'Lesson 9',
    intro: 'DELETE removes rows from a table permanently. Like UPDATE, always use WHERE or you\'ll delete everything! Think before you delete.',
    fact: '⚠️ DELETE is like throwing paper in the bin. Once it\'s gone, it\'s gone! (Unless you have a backup.) Always double-check with SELECT first.',
    code: `<span class="cmt">-- Remove students with GPA below 2.0</span>
<span class="kw">DELETE FROM</span> students
<span class="kw">WHERE</span> gpa < <span class="num">2.0</span>;

<span class="cmt">-- ⚠️ DANGER: This deletes ALL rows!</span>
<span class="cmt">-- DELETE FROM students; ← Never do this!</span>`,
    tryPrompt: 'What\'s the safe way to delete a specific student?',
    tryAnswer: null,
    simFn: () => ({ msg: '✅ DELETE executed. 0 rows affected (no GPA below 2.0 in our data).' }),
    quiz: [
      { q: 'DELETE FROM students; (no WHERE) does what?', opts: ['Deletes one row','Deletes nothing','Deletes ALL rows','Deletes the table'], ans: 2, exp: '😱 It deletes every single row! Always use WHERE with DELETE!' },
      { q: 'Which is the safe way to delete one student?', opts: ['DELETE FROM students;','DELETE students WHERE id=1;','DELETE FROM students WHERE id=1;','REMOVE student 1;'], ans: 2, exp: '✅ DELETE FROM students WHERE id=1; is safe — it only removes that one student.' }
    ]
  },
  {
    id: 9, emoji: '📈', title: 'Aggregation Functions',
    tag: 'Lesson 10',
    intro: 'Want to know how many students, the average GPA, or the oldest student? Aggregation functions crunch numbers for you automatically!',
    fact: '💡 Aggregation = summarising. Instead of looking at every row, you get ONE answer: a count, average, total, max, or min.',
    code: `<span class="cmt">-- Count total students</span>
<span class="kw">SELECT COUNT</span>(id) <span class="kw">FROM</span> students;

<span class="cmt">-- Average GPA</span>
<span class="kw">SELECT AVG</span>(gpa) <span class="kw">FROM</span> students;

<span class="cmt">-- Oldest student</span>
<span class="kw">SELECT MAX</span>(age) <span class="kw">FROM</span> students;

<span class="cmt">-- Youngest student</span>
<span class="kw">SELECT MIN</span>(age) <span class="kw">FROM</span> students;`,
    tryPrompt: 'Try: SELECT COUNT(id) FROM students;',
    tryAnswer: 'select count(id) from students',
    simFn: (q) => {
      if (/count\(id\)/i.test(q)) return { cols:['count'], rows: [[5]] };
      if (/avg\(gpa\)/i.test(q)) return { cols:['avg'], rows: [['3.5']] };
      if (/max\(age\)/i.test(q)) return { cols:['max'], rows: [[32]] };
      if (/min\(age\)/i.test(q)) return { cols:['min'], rows: [[22]] };
      return null;
    },
    quiz: [
      { q: 'Which function finds the average?', opts: ['COUNT()','SUM()','AVG()','MEAN()'], ans: 2, exp: '✅ AVG() calculates the average (sum ÷ number of rows).' },
      { q: 'SELECT MAX(gpa) FROM students; — what does this return?', opts: ['3.6','3.7','4.3','2.7'], ans: 2, exp: '✅ MAX(gpa) returns 4.3 — the highest GPA (Ify Ndu).' }
    ]
  },
  {
    id: 10, emoji: '📦', title: 'GROUP BY',
    tag: 'Lesson 11',
    intro: 'GROUP BY groups rows that share a value so you can run aggregations on each group. Like counting boys and girls separately!',
    fact: '💡 GROUP BY is like sorting your M&Ms by colour before counting them. Each colour is a group!',
    code: `<span class="cmt">-- Count students per gender</span>
<span class="kw">SELECT</span> gender, <span class="kw">COUNT</span>(id)
<span class="kw">FROM</span> students
<span class="kw">GROUP BY</span> gender;

<span class="cmt">-- Average GPA by gender</span>
<span class="kw">SELECT</span> gender, <span class="kw">AVG</span>(gpa)
<span class="kw">FROM</span> students
<span class="kw">GROUP BY</span> gender;`,
    tryPrompt: 'Try: SELECT gender, COUNT(id) FROM students GROUP BY gender;',
    tryAnswer: 'select gender, count(id) from students group by gender',
    simFn: (q) => {
      if (/group by gender/i.test(q) && /count/i.test(q)) return { cols:['gender','count'], rows: [['Female',3],['Male',2]] };
      if (/group by gender/i.test(q) && /avg/i.test(q)) return { cols:['gender','avg_gpa'], rows: [['Female','3.73'],['Male','3.15']] };
      return null;
    },
    quiz: [
      { q: 'GROUP BY gender splits students into how many groups in our data?', opts: ['1','2','3','5'], ans: 1, exp: '✅ Two groups: Male and Female.' },
      { q: 'Can you use COUNT() without GROUP BY?', opts: ['No, never','Yes, it counts all rows','Only with WHERE','Only with ORDER BY'], ans: 1, exp: '✅ Yes! Without GROUP BY, COUNT() counts all rows in the table.' }
    ]
  },
  {
    id: 11, emoji: '✂️', title: 'LIMIT & OFFSET',
    tag: 'Lesson 12',
    intro: 'Got 1 million rows but only want the top 3? LIMIT controls how many results you see. OFFSET skips a number of rows — great for pagination!',
    fact: '💡 Think of LIMIT like saying "show me only the first 3 pages of results" and OFFSET like "skip the first 2 pages, then show me 3 more."',
    code: `<span class="cmt">-- Show only the first 3 students</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">LIMIT</span> <span class="num">3</span>;

<span class="cmt">-- Skip 2, show the rest</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">OFFSET</span> <span class="num">2</span>;

<span class="cmt">-- Skip 2, show next 2</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> students
<span class="kw">LIMIT</span> <span class="num">2</span> <span class="kw">OFFSET</span> <span class="num">2</span>;`,
    tryPrompt: 'Try: SELECT * FROM students LIMIT 3;',
    tryAnswer: 'select * from students limit 3',
    simFn: (q) => {
      const data = [
        [1,'Obi Ikenna',23,'Male',3.6,true],
        [2,'Ada Eze',22,'Female',3.7,true],
        [3,'Afoma Okafor',26,'Female',3.2,false],
        [4,'Musa Isa',32,'Male',2.7,false],
        [5,'Ify Ndu',25,'Female',4.3,true]
      ];
      let rows = [...data];
      const off = q.match(/offset\s+(\d+)/i);
      const lim = q.match(/limit\s+(\d+)/i);
      if (off) rows = rows.slice(parseInt(off[1]));
      if (lim) rows = rows.slice(0, parseInt(lim[1]));
      if (off || lim) return { cols:['id','full_name','age','gender','gpa','enrolled'], rows };
      return null;
    },
    quiz: [
      { q: 'LIMIT 5 OFFSET 10 — what rows does this show?', opts: ['First 5 rows','Rows 1-10','Rows 11-15','Rows 10-15'], ans: 2, exp: '✅ Skip 10, then show 5 more — so rows 11, 12, 13, 14, 15.' },
      { q: 'What\'s LIMIT useful for?', opts: ['Deleting rows','Showing only a few results','Sorting results','Adding rows'], ans: 1, exp: '✅ LIMIT is perfect for previewing data or building pages of results.' }
    ]
  },
  {
    id: 12, emoji: '🏷️', title: 'Aliases (AS)',
    tag: 'Lesson 13',
    intro: 'Column names can be long or confusing. Aliases (AS) let you rename them in your results to make them friendlier and easier to read.',
    fact: '💡 An alias is a nickname! You can give any column a friendlier name just for that query — the original table isn\'t changed at all.',
    code: `<span class="kw">SELECT</span>
  full_name <span class="kw">AS</span> <span class="str">"Student Name"</span>,
  gpa       <span class="kw">AS</span> <span class="str">"Grade Point Average"</span>
<span class="kw">FROM</span> students;`,
    tryPrompt: 'Try typing the query above!',
    tryAnswer: null,
    simFn: () => ({ cols:['Student Name','Grade Point Average'], rows: [['Obi Ikenna',3.6],['Ada Eze',3.7],['Afoma Okafor',3.2],['Musa Isa',2.7],['Ify Ndu',4.3]] }),
    quiz: [
      { q: 'What does AS do in SELECT full_name AS "Name"?', opts: ['Renames the column in the table','Renames only in the result','Deletes the column','Creates a new column'], ans: 1, exp: '✅ AS renames the column in the query result only — the table stays the same.' },
      { q: 'Do you need quotes for alias names with spaces?', opts: ['No, never','Yes, always use double quotes','Only for numbers','Only sometimes'], ans: 1, exp: '✅ In PostgreSQL, use double quotes for aliases with spaces like "Student Name".' }
    ]
  },
  {
    id: 13, emoji: '🔀', title: 'CASE Statement',
    tag: 'Lesson 14',
    intro: 'CASE is SQL\'s version of if-else! It checks conditions one by one and returns a value for the first one that\'s true. Perfect for adding labels to data.',
    fact: '💡 CASE WHEN is like a traffic light: if condition A → do this, else if condition B → do that, otherwise → do this default thing.',
    code: `<span class="kw">SELECT</span> full_name, gpa,
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> gpa >= <span class="num">4.0</span> <span class="kw">THEN</span> <span class="str">'Excellent'</span>
    <span class="kw">WHEN</span> gpa >= <span class="num">3.0</span> <span class="kw">THEN</span> <span class="str">'Good'</span>
    <span class="kw">ELSE</span> <span class="str">'Needs Improvement'</span>
  <span class="kw">END AS</span> Comments
<span class="kw">FROM</span> students;`,
    tryPrompt: 'Which student gets "Excellent"?',
    tryAnswer: null,
    simFn: () => ({ cols:['full_name','gpa','Comments'], rows: [['Obi Ikenna',3.6,'Good'],['Ada Eze',3.7,'Good'],['Afoma Okafor',3.2,'Good'],['Musa Isa',2.7,'Needs Improvement'],['Ify Ndu',4.3,'Excellent']] }),
    quiz: [
      { q: 'Which student gets the "Excellent" label?', opts: ['Obi Ikenna','Ada Eze','Musa Isa','Ify Ndu'], ans: 3, exp: '✅ Ify Ndu has GPA 4.3 which is ≥ 4.0, so she gets "Excellent"!' },
      { q: 'What does ELSE do in a CASE statement?', opts: ['Ends the CASE','Skips the row','Runs when no WHEN matches','Runs always'], ans: 2, exp: '✅ ELSE is the "default" — it runs when none of the WHEN conditions are true.' }
    ]
  },
  {
    id: 14, emoji: '🔗', title: 'JOINs',
    tag: 'Lesson 15',
    intro: 'What if data is spread across two tables? JOIN combines them! INNER JOIN gives you rows where data matches in BOTH tables.',
    fact: '💡 Imagine students table has names, and courses table has what each student studies. JOIN is like matching student ID cards to their course cards.',
    code: `<span class="cmt">-- Create courses table</span>
<span class="kw">CREATE TABLE</span> courses (
  id         <span class="kw">SERIAL PRIMARY KEY</span>,
  student_id <span class="kw">INTEGER</span>,
  course_name <span class="kw">TEXT</span>
);

<span class="cmt">-- Join students with their courses</span>
<span class="kw">SELECT</span> students.full_name, courses.course_name
<span class="kw">FROM</span> students
<span class="kw">INNER JOIN</span> courses
  <span class="kw">ON</span> students.id = courses.student_id;`,
    tryPrompt: 'Try the JOIN query above!',
    tryAnswer: null,
    simFn: () => ({ cols:['full_name','course_name'], rows: [['Ada Eze','Data Analytics'],['Afoma Okafor','Data Analytics'],['Ify Ndu','Data Viz']] }),
    quiz: [
      { q: 'What does INNER JOIN return?', opts: ['All rows from both tables','Only rows with matches in both tables','All rows from left table','All rows from right table'], ans: 1, exp: '✅ INNER JOIN returns only the rows where there is a match in BOTH tables.' },
      { q: 'ON students.id = courses.student_id — what is this?', opts: ['A WHERE clause','The join condition linking both tables','An alias','A GROUP BY'], ans: 1, exp: '✅ The ON clause defines HOW the two tables are connected — the matching key!' }
    ]
  }
];

let current = 0;
const completed = new Set();

function buildSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '<h2>📚 Lessons</h2>';
  LESSONS.forEach((l,i) => {
    const btn = document.createElement('button');
    btn.className = `lesson-btn${i===current?' active':''}${completed.has(i)?' done':''}`;
    btn.innerHTML = `<span class="icon">${l.emoji}</span>${l.title}<span class="check">${completed.has(i)?'✅':''}</span>`;
    btn.onclick = () => { current=i; render(); };
    nav.appendChild(btn);
  });
}

function updateProgress() {
  const pct = Math.round((completed.size/LESSONS.length)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('progress-label').textContent = completed.size+'/'+LESSONS.length;
}

function highlightCode(code) { return code; } // already has spans

function render() {
  buildSidebar();
  updateProgress();
  const main = document.getElementById('main-content');

  if (completed.size === LESSONS.length && current === LESSONS.length) {
    main.innerHTML = `<div class="congrats show">
      <span class="trophy">🏆</span>
      <div class="stars">⭐⭐⭐⭐⭐</div>
      <h2>Amazing! You finished all 15 lessons!</h2>
      <p>You've learned SQL basics with PostgreSQL. You can now query, filter, sort, update, delete, aggregate, group, limit, alias, use CASE, and JOIN tables. That's huge!</p>
      <button class="btn-restart" onclick="restartAll()">🔄 Start Again</button>
    </div>`;
    return;
  }

  const l = LESSONS[current];
  const quizHTML = l.quiz.map((q,qi) => `
    <div class="quiz-card" id="qcard-${qi}">
      <div class="q">Q${qi+1}: ${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o,oi) => `<button class="quiz-option" onclick="checkAnswer(${qi},${oi},${q.ans},'${encodeURIComponent(q.exp)}')">${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="qfb-${qi}"></div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-tag">${l.tag} of 15</div>
      <h2>${l.emoji} ${l.title}</h2>
      <p class="intro">${l.intro}</p>
      <div class="fun-fact"><span></span>${l.fact}</div>
      <div class="code-example"><code>${l.code}</code></div>

      ${l.tryPrompt ? `
      <div class="try-it">
        <h4>⌨️ Try It Yourself!</h4>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:10px;">${l.tryPrompt}</p>
        <textarea id="sql-input" placeholder="Type your SQL here...">${l.tryAnswer||''}</textarea>
        <button class="btn-run" onclick="runQuery(${current})">▶ Run Query</button>
        <div class="sim-result" id="sim-result"></div>
      </div>
      ` : ''}

      <div class="quiz-section">
        <h3>🧠 Quick Quiz</h3>
        ${quizHTML}
      </div>

      <div class="nav-btns">
        ${current > 0 ? `<button class="btn-nav btn-prev" onclick="goLesson(-1)">← Previous</button>` : '<div></div>'}
        <button class="btn-nav btn-next" onclick="markDoneAndNext()">
          ${current < LESSONS.length-1 ? 'Next Lesson →' : '🎉 Finish!'}
        </button>
      </div>
    </div>
  `;

  window.scrollTo(0,0);
}

function checkAnswer(qi, chosen, correct, expEnc) {
  const card = document.getElementById('qcard-'+qi);
  const btns = card.querySelectorAll('.quiz-option');
  const fb = document.getElementById('qfb-'+qi);
  if (btns[0].disabled) return;
  btns.forEach(b => b.disabled = true);
  btns[chosen].classList.add(chosen===correct?'correct':'wrong');
  if (chosen!==correct) btns[correct].classList.add('correct');
  const exp = decodeURIComponent(expEnc);
  fb.textContent = chosen===correct ? exp : '❌ Not quite. '+exp;
  fb.className = 'quiz-feedback show '+(chosen===correct?'correct':'wrong');
}

function runQuery(lessonIdx) {
  const q = document.getElementById('sql-input').value.trim().toLowerCase();
  const l = LESSONS[lessonIdx];
  const result = l.simFn ? l.simFn(q) : null;
  const div = document.getElementById('sim-result');
  div.classList.add('show');
  if (!result) {
    div.innerHTML = `<p class="result-msg" style="color:#f6a623;">🤔 Hmm, try adjusting your query and run again!</p>`;
    return;
  }
  if (result.msg) {
    div.innerHTML = `<p class="result-msg">${result.msg}</p>`;
    return;
  }
  const { cols, rows } = result;
  if (rows.length === 0) {
    div.innerHTML = `<p class="result-msg">✅ Query ran! (0 rows returned)</p>`;
    return;
  }
  div.innerHTML = `<table class="sim-table">
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
  </table><p class="result-msg" style="margin-top:8px;font-size:0.72rem;opacity:0.7;">${rows.length} row${rows.length!==1?'s':''} returned</p>`;
}

function goLesson(dir) {
  current = Math.max(0, Math.min(LESSONS.length-1, current+dir));
  render();
}

function markDoneAndNext() {
  completed.add(current);
  if (current < LESSONS.length-1) {
    current++;
    render();
  } else {
    current = LESSONS.length;
    render();
  }
}

function restartAll() {
  completed.clear();
  current = 0;
  render();
}

render();
</script>
</body>
</html>
